spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: unitrack-backend

  profiles:
    active:
      - dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/unitrack}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  jackson:
    serialization:
      "[indent_output]": true

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-at-least-32-characters}
  refresh-secret: ${JWT_REFRESH_SECRET:change-this-refresh-secret-key-at-least-32-characters}
  expiration: 900000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

server:
  port: 8080

logging:
  level:
    root: INFO
    "[org.springframework.security]": WARN
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE
    "[com.tuempresa.tuproject]": DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] [%thread] %logger{36} - %msg%n"