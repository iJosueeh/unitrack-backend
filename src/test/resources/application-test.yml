spring:
  datasource:
    url: jdbc:h2:mem:unitrack;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": false

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-jwt-signing-test-secret-key-12345
  refresh-secret: test-refresh-secret-key-for-jwt-signing-1234567
  expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    root: WARN
